<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gabriel Abdo Alcântara</title>
  <meta name="description" content="Gabriel Abdo Alcântara — Filmmaker, Director of Photography, Photographer." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      font-family: 'Inter', system-ui, sans-serif;
      background: #f5f5f0;
      color: #0f0f0f;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* The floating word */
    #uc {
      position: fixed;
      font-size: clamp(1rem, 2.8vw, 1.9rem);
      font-weight: 400;
      letter-spacing: -0.01em;
      color: rgba(15, 15, 15, 0.72);
      pointer-events: none;
      user-select: none;
      white-space: nowrap;
      line-height: 1;
    }

    /* Name — bottom left, always fixed */
    #name {
      position: fixed;
      bottom: 48px;
      left: 52px;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: -0.01em;
      color: rgba(15, 15, 15, 0.38);
      user-select: none;
    }
  </style>

  <link rel="icon" type="image/svg+xml" href="images/favicon.svg" />
</head>
<body>

  <span id="uc">under construction.</span>
  <div id="name">Gabriel Abdo Alcântara</div>

  <script>
    const el = document.getElementById('uc');

    let x = window.innerWidth  * 0.38;
    let y = window.innerHeight * 0.40;
    let vx = (Math.random() - 0.5) * 0.55;
    let vy = (Math.random() - 0.5) * 0.55;
    let w = 0, h = 0;
    let mx = -9999, my = -9999;

    function measure() {
      w = el.offsetWidth;
      h = el.offsetHeight;
    }

    function tick() {
      const VW = window.innerWidth;
      const VH = window.innerHeight;
      const PAD = 28;
      const REPEL = 180;

      // Cursor repulsion
      const cx = x + w * 0.5;
      const cy = y + h * 0.5;
      const dx = cx - mx;
      const dy = cy - my;
      const d = Math.sqrt(dx * dx + dy * dy) || 1;
      if (d < REPEL) {
        const f = ((REPEL - d) / REPEL) * 0.4;
        vx += (dx / d) * f;
        vy += (dy / d) * f;
      }

      // Speed cap
      const spd = Math.sqrt(vx * vx + vy * vy);
      if (spd > 2.5) { vx = vx / spd * 2.5; vy = vy / spd * 2.5; }

      // Friction
      vx *= 0.985;
      vy *= 0.985;

      // Keep drifting if nearly still
      if (spd < 0.18) {
        vx += (Math.random() - 0.5) * 0.06;
        vy += (Math.random() - 0.5) * 0.06;
      }

      x += vx;
      y += vy;

      // Bounce off edges
      if (x < PAD)            { x = PAD;            vx =  Math.abs(vx) * 0.75; }
      if (x + w > VW - PAD)   { x = VW - w - PAD;   vx = -Math.abs(vx) * 0.75; }
      if (y < PAD)            { y = PAD;            vy =  Math.abs(vy) * 0.75; }
      if (y + h > VH - PAD)   { y = VH - h - PAD;   vy = -Math.abs(vy) * 0.75; }

      el.style.left = x + 'px';
      el.style.top  = y + 'px';

      requestAnimationFrame(tick);
    }

    document.fonts.ready.then(() => { measure(); tick(); });
    window.addEventListener('resize', measure);
    document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
    document.addEventListener('touchmove', e => {
      mx = e.touches[0].clientX;
      my = e.touches[0].clientY;
    }, { passive: true });
    document.addEventListener('touchend', () => { mx = -9999; my = -9999; });
  </script>

</body>
</html>
